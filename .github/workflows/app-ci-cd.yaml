name: app-ci-cd pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  GITOPS_REPO: ${{ vars.GITOPS_REPO }}
  GITOPS_BRANCH: ${{ vars.GITOPS_BRANCH }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest   # GitHub가 제공하는 Ubuntu 가상머신에서 실행

    permissions:
      id-token: write
      contents: read
    
    steps:
      # GitHub 코드 체크아웃
      - name: checkout github
        # actions/checkout@v4
        # 현재 GitHub 저장소 코드를 runner(ubuntu 서버)에 내려받는 공식 액션
        # 이 단계 없으면 docker build할 소스 코드가 없음
        uses: actions/checkout@v4

      - name: Create IMAGE_TAG with GITHUB_SHA
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      # AWS 인증 (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Assume 할 IAM Role ARN
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

          # 인증 대상 AWS 리전
          aws-region: ${{ vars.AWS_REGION }}

      # ECR 로그인
      - name: Login to ECR
        # aws-actions/amazon-ecr-login@v2
        # → Docker가 AWS ECR에 push할 수 있도록 로그인 처리
        uses: aws-actions/amazon-ecr-login@v2
      
      # 변경된 폴더 감지
      - name: detect changed services
        id: changes

        # dorny/paths-filter@v3
        # push에서 변경된 파일 목록을 분석 지정한 경로에 변경이 있으면 true/false 자동 생성
        # changes.outputs.member 같은 값으로 접근 가능
        uses: dorny/paths-filter@v3

        with:
          filters: |
            gateway:
              - 'msa/apigateway/**'
            member:
              - 'msa/member/**'
            ordering:
              - 'msa/ordering/**'
            product:
              - 'msa/product/**'

      # 변경 없으면 종료
      - name: stop if no service changed
        # 모든 서비스가 false일 경우 실행
        # 불필요한 docker build 방지
        if: |
          steps.changes.outputs.gateway != 'true' &&
          steps.changes.outputs.member != 'true' &&
          steps.changes.outputs.ordering != 'true' &&
          steps.changes.outputs.product != 'true'
        run: |
          echo "No service directory changed. Skip build."
          exit 0

      # yq 설치
      - name: Install yq
        run: |
          sudo wget -O /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.2/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      # APIGateway build/push
      - name: Build and push apigateway image
        if: steps.changes.outputs.gateway == 'true'
        env:
          REPOSITORY: apigateway
          DOCKERFILE_PATH: ./msa/apigateway/Dockerfile
          BUILD_CONTEXT: ./msa/apigateway
        run: |
          docker build \
            -t ${ECR_REGISTRY}/${REPOSITORY}:${IMAGE_TAG} \
            -f ${DOCKERFILE_PATH} ${BUILD_CONTEXT}

          docker push ${ECR_REGISTRY}/${REPOSITORY}:${IMAGE_TAG}

      # Member build/push
      - name: Build and push member image
        if: steps.changes.outputs.member == 'true'
        env:
          REPOSITORY: member-service
          DOCKERFILE_PATH: ./msa/member/Dockerfile
          BUILD_CONTEXT: ./msa/member
        run: |
          docker build \
            -t ${ECR_REGISTRY}/${REPOSITORY}:${IMAGE_TAG} \
            -f ${DOCKERFILE_PATH} ${BUILD_CONTEXT}

          docker push ${ECR_REGISTRY}/${REPOSITORY}:${IMAGE_TAG}

      # Ordering build/push
      - name: Build and push ordering image
        if: steps.changes.outputs.ordering == 'true'
        env:
          REPOSITORY: ordering-service
          DOCKERFILE_PATH: ./msa/ordering/Dockerfile
          BUILD_CONTEXT: ./msa/ordering
        run: |
          docker build \
            -t ${ECR_REGISTRY}/${REPOSITORY}:${IMAGE_TAG} \
            -f ${DOCKERFILE_PATH} ${BUILD_CONTEXT}

          docker push ${ECR_REGISTRY}/${REPOSITORY}:${IMAGE_TAG}

      # Product build/push
      - name: Build and push product image
        if: steps.changes.outputs.product == 'true'
        env:
          REPOSITORY: product-service
          DOCKERFILE_PATH: ./msa/product/Dockerfile
          BUILD_CONTEXT: ./msa/product
        run: |
          docker build \
            -t ${ECR_REGISTRY}/${REPOSITORY}:${IMAGE_TAG} \
            -f ${DOCKERFILE_PATH} ${BUILD_CONTEXT}

          docker push ${ECR_REGISTRY}/${REPOSITORY}:${IMAGE_TAG}

      # GitOps repo checkout
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: ${{ env.GITOPS_BRANCH }}
          token: ${{ secrets.GH_PAT }}
          path: gitops

      # APIGateway manifest tag 수정
      - name: Update apigateway manifest
        if: steps.changes.outputs.gateway == 'true'
        env:
          FULL_IMAGE: ${{ env.ECR_REGISTRY }}/apigateway:$IMAGE_TAG 
          FILE_PATH: gitops/apps/apigateway/depl.yaml
        run: |
          yq -i '
            .spec.template.spec.containers[].image = strenv(FULL_IMAGE)
          ' "${FILE_PATH}"

      # Member manifest tag 수정
      - name: Update member manifest
        if: steps.changes.outputs.member == 'true'
        env:
          FULL_IMAGE: ${{ env.ECR_REGISTRY }}/member-service:$IMAGE_TAG 
          FILE_PATH: gitops/apps/member/depl.yaml
        run: |
          yq -i '
            .spec.template.spec.containers[].image = strenv(FULL_IMAGE)
          ' "${FILE_PATH}"

      # Ordering manifest tag 수정
      - name: Update ordering manifest
        if: steps.changes.outputs.ordering == 'true'
        env:
          FULL_IMAGE: ${{ env.ECR_REGISTRY }}/ordering-service:$IMAGE_TAG 
          FILE_PATH: gitops/apps/ordering/depl.yaml
        run: |
          yq -i '
            .spec.template.spec.containers[].image = strenv(FULL_IMAGE)
          ' "${FILE_PATH}"

      # Product manifest tag 수정
      - name: Update product manifest
        if: steps.changes.outputs.product == 'true'
        env:
          FULL_IMAGE: ${{ env.ECR_REGISTRY }}/product-service:$IMAGE_TAG 
          FILE_PATH: gitops/apps/product/depl.yaml
        run: |
          yq -i '
            .spec.template.spec.containers[].image = strenv(FULL_IMAGE)
          ' "${FILE_PATH}"

      # Git 설정
      - name: Configure git identity
        working-directory: gitops
        run: |
          git config user.name "${{ vars.GITOPS_COMMIT_USER_NAME }}"
          git config user.email "${{ vars.GITOPS_COMMIT_USER_EMAIL }}"

      # 변경사항 commit/push
      - name: Commit and push manifest changes
        working-directory: gitops
        run: |
          git add apps/apigateway/depl.yaml \
                  apps/member/depl.yaml \
                  apps/ordering/depl.yaml \
                  apps/product/depl.yaml

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "chore: update image tags to ${IMAGE_TAG}"
          git push origin "${GITOPS_BRANCH}"
